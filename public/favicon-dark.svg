<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Dark background for dark mode -->
  <rect width="1024" height="1024" fill="#111111" rx="224"/>
  
  <!-- Stacked ovals - Foro Agora logo (white for dark mode) -->
  <!-- Oval 1 (top, smallest) - 112px -->
  <ellipse cx="512" cy="240" rx="112" ry="48" fill="#ffffff"/>
  
  <!-- Oval 2 - 160px -->
  <ellipse cx="512" cy="368" rx="160" ry="64" fill="#ffffff"/>
  
  <!-- Oval 3 - 224px -->
  <ellipse cx="512" cy="520" rx="224" ry="88" fill="#ffffff"/>
  
  <!-- Oval 4 (bottom, largest) - 288px -->
  <ellipse cx="512" cy="704" rx="288" ry="112" fill="#ffffff"/>
</svg>
